server {
    listen       80;
    server_name  _;

    location / {
      root   /usr/share/nginx/html;
      index  index.html;
      sub_filter </body>
          '${MESSAGE}</body>';
      sub_filter_once on;

      auth_basic "Restricted Access";
      auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location ~ /\.ht {
        deny  all;
    }
}
